services:
  mongo:
    image: mongo:7
    container_name: todo-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - todo-network

  api:
    build: .
    container_name: todo-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - mongo
    networks:
      - todo-network

volumes:
  mongo-data:

networks:
  todo-network:
    driver: bridge
