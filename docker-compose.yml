services:
  mongo:
    image: mongo:7
    container_name: todo-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - todo-network

  api:
    build: .
    container_name: todo-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mongo
    networks:
      - todo-network

  nginx:
    image: nginx:alpine
    container_name: todo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - todo-network

volumes:
  mongo-data:

networks:
  todo-network:
    driver: bridge
